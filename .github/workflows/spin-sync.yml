name: Spin Sync

on:
  # Runs ~15 min after each class ends (all times UTC; ET = UTC-4 in summer, UTC-5 in winter).
  # Classes and their trigger times (ET → UTC summer / winter):
  #   Mon   07:15–08:00  →  fire 08:15 ET  =  12:15 UTC (summer) / 13:15 UTC (winter)
  #   Tue   12:00–12:45  →  fire 13:00 ET  =  17:00 UTC (summer) / 18:00 UTC (winter)
  #   Wed   07:15–08:15  →  fire 08:30 ET  =  12:30 UTC (summer) / 13:30 UTC (winter)
  #   Sat   10:00–11:00  →  fire 11:15 ET  =  15:15 UTC (summer) / 16:15 UTC (winter)
  #   Sun   09:30–10:30  →  fire 10:45 ET  =  14:45 UTC (summer) / 15:45 UTC (winter)
  #   Sun   (90-min class ends 11:00) catch-up run at 11:30 ET = 15:30 UTC (summer) / 16:30 UTC (winter)
  #
  # Two cron entries per day cover both DST offsets.  The LOOKBACK_SECONDS env
  # var (set to 2 h below) means a workout will still be picked up if the cron
  # fires before Strava has finished processing, and re-runs are safe because
  # the state file prevents double-uploads.
  schedule:
    # Monday — 08:00 class ends; fire at 08:15 ET
    - cron: "15 12 * * 1"   # EDT (summer)
    - cron: "15 13 * * 1"   # EST (winter)
    # Tuesday — 12:45 class ends; fire at 13:00 ET
    - cron: "0 17 * * 2"    # EDT
    - cron: "0 18 * * 2"    # EST
    # Wednesday — 08:15 class ends; fire at 08:30 ET
    - cron: "30 12 * * 3"   # EDT
    - cron: "30 13 * * 3"   # EST
    # Saturday — 11:00 class ends; fire at 11:15 ET
    - cron: "15 15 * * 6"   # EDT
    - cron: "15 16 * * 6"   # EST
    # Sunday — 10:30 regular class ends; fire at 10:45 ET
    - cron: "45 14 * * 0"   # EDT
    - cron: "45 15 * * 0"   # EST
    # Sunday — 90-min class catch-up; fire at 11:30 ET
    - cron: "30 15 * * 0"   # EDT
    - cron: "30 16 * * 0"   # EST

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    name: Sync ICG → Strava → Garmin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the sync state so we don't re-upload old workouts.
      # The state file is stored as a GitHub Actions cache keyed by a fixed
      # key; the restore-keys fallback picks up the most recent cache if the
      # exact key is missing (e.g. after the first run).
      - name: Restore sync state
        uses: actions/cache/restore@v4
        id: restore-state
        with:
          path: ~/.spin-sync-state.json
          key: spin-sync-state-${{ github.run_id }}
          restore-keys: spin-sync-state-

      - name: Run sync
        env:
          STRAVA_CLIENT_ID:      ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET:  ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN:  ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GARMIN_EMAIL:          ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:       ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_DEVICE_UNIT_ID: ${{ secrets.GARMIN_DEVICE_UNIT_ID }}
          GARMIN_PRODUCT_ID:     ${{ secrets.GARMIN_PRODUCT_ID }}
          # Look back 2 hours so we don't miss a workout if the cron ran late
          LOOKBACK_SECONDS:      "7200"
        run: python src/sync.py

      # Save the updated state so the next run knows which IDs were processed.
      - name: Save sync state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.spin-sync-state.json
          key: spin-sync-state-${{ github.run_id }}

      # If the Strava refresh token rotated, update the secret automatically.
      # Requires a repo secret called GH_PAT with the `secrets` write scope.
      - name: Rotate Strava refresh token (if needed)
        if: hashFiles('.strava_refresh_token') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO:     ${{ github.repository }}
        run: |
          NEW_TOKEN=$(cat .strava_refresh_token)
          echo "Updating STRAVA_REFRESH_TOKEN secret …"
          gh secret set STRAVA_REFRESH_TOKEN --body "$NEW_TOKEN" --repo "$REPO"
          rm .strava_refresh_token
